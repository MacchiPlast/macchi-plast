<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Macchi Plast - Storico ODL</title>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>ODL</th>
                <th>Articoli</th>
                <th>Cliente</th>
            </tr>
        </thead>
        <tbody id="tabella-corpo">
            </tbody>
    </table>

    <script>
        let DATA = {}; // Qui caricherai il tuo data.json
        let DB = {};
        let ARTS = [];

        function init() {
            // Pulizia tabella prima di inizializzare
            document.getElementById('tabella-corpo').innerHTML = '';

            DATA.odl.forEach(o => {
                // 1. Gestione DB (Logica aggiornata per lista articoli)
                if (!o.articoli || o.articoli.length === 0) return;

                o.articoli.forEach(art => {
                    if (!DB[art]) {
                        let cli = o.cliente;
                        // Manteniamo la tua logica personalizzata
                        if (art.indexOf('101A') === 0 || art === '201A3308B') cli = 'Componenti Vending';
                        
                        DB[art] = {
                            articolo: art,
                            cliente: cli,
                            pressa: o.pressa,
                            peso: null,
                            mat: o.materiale,
                            n: 0,
                            ore_med: DATA.soglie[art] || null,
                            opp: DATA.orepp[art] || null
                        };
                    }
                    DB[art].n++;
                    if (o.peso_medio && o.peso_medio > 0 && o.peso_medio < 10000) DB[art].peso = o.peso_medio;
                    if (!DB[art].mat && o.materiale) DB[art].mat = o.materiale;
                });

                // 2. Generazione riga tabella (Logica aggiornata con .join)
                const articoliString = o.articoli.join(', ');
                
                const riga = `<tr>
                    <td>${o.odl}</td>
                    <td>${articoliString}</td>
                    <td>${o.cliente}</td>
                </tr>`;
                
                document.getElementById('tabella-corpo').innerHTML += riga;
            });

            ARTS = Object.keys(DB).sort();
        }

        // Assicurati di caricare il file data.json prima di chiamare init()
        // Esempio: fetch('data.json').then(r => r.json()).then(d => { DATA = d; init(); });
    </script>
</body>
</html>
