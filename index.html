<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macchi Plast</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f3ef;--surface:#fff;--border:#e2dfd9;--border-s:#c5c1ba;
  --text:#1a1917;--muted:#6b6762;--hint:#a09c96;
  --green:#1a7a4a;--green-bg:#edf7f2;--green-b:#aedcc4;
  --blue:#1a4fa0;--blue-bg:#eef3fc;--blue-b:#b0c8f0;
  --amber:#7a4f00;--amber-bg:#fdf4e0;--amber-b:#e8d090;
  --red:#9a1f1f;--red-bg:#fdf0f0;--red-b:#e8b0b0;
  --purple:#5b2d8e;--purple-bg:#f3eeff;--purple-b:#c9b0e8;
  --r:8px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.header{background:var(--text);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.htitle{font-size:17px;font-weight:600}
.hsub{font-size:12px;opacity:.5;font-family:'IBM Plex Mono',monospace;margin-top:2px}
.hbadge{font-size:11px;font-family:'IBM Plex Mono',monospace;background:rgba(255,255,255,.12);padding:3px 10px;border-radius:99px;color:rgba(255,255,255,.65)}
.container{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:1rem}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.row2{grid-template-columns:1fr}}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
input{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:var(--r);font-family:'IBM Plex Sans',sans-serif;font-size:15px;color:var(--text);background:var(--bg);outline:none}
input:focus{border-color:var(--text);background:#fff}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border-s);border-radius:var(--r);z-index:300;max-height:220px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,.1);display:none}
.ac-item{padding:9px 13px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--bg)}
.ac-code{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}
.ac-cli{font-size:11px;color:var(--hint)}
.ac-pos{font-size:11px;font-family:'IBM Plex Mono',monospace;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-b);padding:1px 6px;border-radius:4px;flex-shrink:0}
.hidden{display:none}
.art-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
.art-code{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600}
.art-cli{font-size:13px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:3px 12px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden}
.sh{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
.sicon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.si-blue{background:var(--blue-bg)}.si-green{background:var(--green-bg)}.si-gray{background:#f0ede8}.si-purple{background:var(--purple-bg)}
.slabel{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.sb{padding:14px 16px}
.pos-big{display:inline-flex;align-items:center;gap:16px;background:var(--purple-bg);border:2px solid var(--purple-b);border-radius:var(--rl);padding:14px 20px;margin-bottom:1rem}
.pos-coord{font-family:'IBM Plex Mono',monospace;font-size:48px;font-weight:600;color:var(--purple);line-height:1}
.pos-info{display:flex;flex-direction:column;gap:6px}
.pos-riga{font-size:13px;color:var(--purple);font-weight:500}
.pos-label{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--purple);opacity:.8;text-transform:uppercase;letter-spacing:.5px}
.pos-stampo{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--purple);opacity:.9}
.pos-altri{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.6}
.pos-altri b{font-family:'IBM Plex Mono',monospace;font-weight:500;color:var(--text)}
.pos-none{font-size:13px;color:var(--hint);padding:4px 0}
.error-msg{background:var(--red-bg);border:1px solid var(--red-b);color:var(--red);padding:12px 16px;border-radius:var(--r);margin-top:1rem;display:none}
.error-msg.show{display:block}
.metric{flex:1;min-width:110px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px}
.ml{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.mv{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;line-height:1.1}
.mu{font-size:11px;color:var(--hint);margin-top:2px}
.metrics{display:flex;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="htitle">Macchi Plast &mdash; Ricerca Componenti</div>
    <div class="hsub">Ricerca da config.json</div>
  </div>
  <div class="hbadge">v9 Fixed</div>
</div>
<div class="container">
  <div class="card">
    <div class="card-title">Cerca articolo</div>
    <div class="row2">
      <div>
        <label>Articolo / Stampo</label>
        <div class="ac-wrap">
          <input type="text" id="inp-art" placeholder="Cerca codice articolo (es: 101A1368A, 0009-B, APLA00813)..." autocomplete="off">
          <div class="ac-list" id="ac-list"></div>
        </div>
      </div>
      <div>
        <label>Pezzi da produrre (per stima)</label>
        <input type="number" id="inp-pezzi" placeholder="es. 1500">
      </div>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div id="riepilogo" class="hidden">
    <div class="art-header">
      <div class="art-code" id="r-cod"></div>
      <div class="art-cli" id="r-cli"></div>
    </div>

    <div class="section">
      <div class="sh">
        <div class="sicon si-purple">📍</div>
        <div class="slabel">Posizione Stampo</div>
      </div>
      <div class="sb">
        <div class="pos-big">
          <div class="pos-coord" id="r-pos-coord"></div>
          <div class="pos-info">
            <div class="pos-label">Posizione scaffale</div>
            <div class="pos-riga" id="r-pos-riga"></div>
            <div class="pos-label" style="margin-top:6px">Stampo</div>
            <div class="pos-stampo" id="r-pos-stampo"></div>
          </div>
        </div>
        <div class="pos-altri" id="r-pos-altri"></div>
      </div>
    </div>

    <div class="section" id="dati-section" style="display:none">
      <div class="sh">
        <div class="sicon si-blue">📋</div>
        <div class="slabel">Dati Ordine</div>
      </div>
      <div class="sb">
        <div class="metrics">
          <div class="metric">
            <div class="ml">ODL</div>
            <div class="mv" id="r-odl" style="font-size:16px"></div>
          </div>
          <div class="metric">
            <div class="ml">Cliente</div>
            <div class="mv" id="r-cliente" style="font-size:16px"></div>
          </div>
          <div class="metric">
            <div class="ml">Pressa</div>
            <div class="mv" id="r-pressa" style="font-size:16px"></div>
          </div>
          <div class="metric">
            <div class="ml">Pezzi</div>
            <div class="mv" id="r-pezzi" style="font-size:16px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var configData = null;
  var dataArray = null;
  var articoloToScaffale = {};

async function loadData() {
    try {
      const configRes = await fetch('config.json');
      if (!configRes.ok) throw new Error('config.json non trovato');
      configData = await configRes.json();

      const dataRes = await fetch('data.json');
      if (dataRes.ok) {
        const rawData = await dataRes.json();
        // MODIFICA QUI: estraiamo l'array dalla chiave "odl"
        dataArray = rawData.odl ? rawData.odl : []; 
        console.log("Dati caricati:", dataArray);
      }

      createInverseMapping();
      setupSearch();
    } catch (error) {
      showError('Errore: ' + error.message);
    }
  }
  function createInverseMapping() {
    // 1. Mappa dagli scaffali (config.json)
    if (configData && configData.scaffali) {
      for (const [scaffale, articoli] of Object.entries(configData.scaffali)) {
        for (const entry of articoli) {
          // Gestione separatori / e ,
          let lista = entry.split(/[\/,]/).map(s => s.trim());
          for (const item of lista) {
            if (item) articoloToScaffale[item] = scaffale;
          }
        }
      }
    }

    // 2. Assicurati che gli articoli di data.json siano mappabili anche se non in config
    if (dataArray) {
      dataArray.forEach(record => {
        if (record.articolo && !articoloToScaffale[record.articolo]) {
          articoloToScaffale[record.articolo] = "Non collocato";
        }
      });
    }
  }

  function setupSearch() {
    const inp = document.getElementById('inp-art');
    const acList = document.getElementById('ac-list');

    inp.addEventListener('input', function() {
      const val = this.value.trim().toUpperCase();
      if (!val || val.length < 1) {
        acList.style.display = 'none';
        return;
      }

      const matches = Object.keys(articoloToScaffale)
        .filter(a => a.toUpperCase().includes(val))
        .slice(0, 10);

      if (!matches.length) {
        acList.style.display = 'none';
        return;
      }

      acList.innerHTML = matches.map(articolo => {
        const scaffale = articoloToScaffale[articolo];
        return `
          <div class="ac-item" onclick="window.selezionaArticolo('${articolo}')">
            <span>
              <div class="ac-code">${articolo}</div>
              <div class="ac-cli">${scaffale}</div>
            </span>
            <span class="ac-pos">${scaffale}</span>
          </div>
        `;
      }).join('');
      acList.style.display = 'block';
    });

    inp.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        const firstItem = acList.querySelector('.ac-item');
        if (firstItem) {
          const articolo = firstItem.getAttribute('onclick').match(/'([^']+)'/)[1];
          selezionaArticolo(articolo);
        }
      }
    });

    window.selezionaArticolo = function(articolo) {
      document.getElementById('inp-art').value = articolo;
      acList.style.display = 'none';
      mostraRisultato(articolo);
    };
  }

  function mostraRisultato(articolo) {
    hideError();
    
    const scaffale = articoloToScaffale[articolo] || "Non specificato";
    
    // UI: Intestazione
    document.getElementById('r-cod').textContent = articolo;
    document.getElementById('r-cli').textContent = 'Scaffale: ' + scaffale;

    // UI: Posizione (se possibile)
    if (scaffale !== "Non collocato" && scaffale !== "Non specificato") {
      const riga = scaffale.match(/[A-Z]/) ? scaffale.match(/[A-Z]/)[0] : '?';
      const colonna = scaffale.match(/\d+/) ? scaffale.match(/\d+/)[0] : '?';
      document.getElementById('r-pos-coord').textContent = scaffale;
      document.getElementById('r-pos-riga').textContent = `Riga ${riga} · Colonna ${colonna}`;
    } else {
      document.getElementById('r-pos-coord').textContent = 'N/A';
      document.getElementById('r-pos-riga').textContent = 'Posizione non definita';
    }
    document.getElementById('r-pos-stampo').textContent = articolo;

    // UI: Altri articoli
    const altriArticoli = configData.scaffali ? (configData.scaffali[scaffale] || []) : [];
    const altri = altriArticoli.filter(a => a !== articolo);
    document.getElementById('r-pos-altri').innerHTML = altri.length > 0 
      ? '<div style="margin-top:10px"><b>Stesso scaffale:</b> ' + altri.join(', ') + '</div>' 
      : '';

    // UI: Dati da data.json
    let datiSection = document.getElementById('dati-section');
    if (dataArray) {
      const record = dataArray.find(r => r.articolo && r.articolo.toUpperCase() === articolo.toUpperCase());
      if (record) {
        document.getElementById('r-odl').textContent = record.odl || '—';
        document.getElementById('r-cliente').textContent = record.cliente || '—';
        document.getElementById('r-pressa').textContent = record.pressa || '—';
        document.getElementById('r-pezzi').textContent = record.pezzi ? record.pezzi.toLocaleString('it-IT') : '—';
        datiSection.style.display = 'block';
      } else {
        datiSection.style.display = 'none';
      }
    } else {
      datiSection.style.display = 'none';
    }

    document.getElementById('riepilogo').classList.remove('hidden');
  }

  function showError(msg) {
    const err = document.getElementById('error-msg');
    err.textContent = msg;
    err.classList.add('show');
  }

  function hideError() {
    document.getElementById('error-msg').classList.remove('show');
  }

  loadData();
})();
</script>
</body>
</html>
